{% extends "base.html" %}

{% block title %}Operational Reports — TransitOps{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 p-6 dark:bg-gray-900">
  <div class="mb-6 flex items-center justify-between">
    <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Operational Reports</h1>
    <a href="{% url 'reports:export_vehicles_csv' %}?search={{ filters.search|default:'' }}&amp;vehicle_type={{ filters.vehicle_type|default:'' }}" class="rounded bg-green-600 px-4 py-2 font-bold text-white shadow hover:bg-green-700">
      Download CSV
    </a>
  </div>

  <div class="mb-6 flex flex-wrap gap-4 rounded-lg bg-white p-4 shadow dark:bg-gray-800">
    <input type="text" name="search" placeholder="Search registration or name..." value="{{ filters.search|default:'' }}" hx-get="{% url 'reports:overview' %}" hx-trigger="keyup changed delay:300ms" hx-target="#report-table-body" class="w-64 rounded-md border-gray-300 dark:bg-gray-700 dark:text-white">
  </div>

  <div class="overflow-hidden rounded-lg bg-white shadow dark:bg-gray-800">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
      <thead class="bg-gray-100 dark:bg-gray-700">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500">Vehicle</th>
          <th class="px-6 py-3 text-left text-xs font-medium uppercase tracking-wider text-gray-500">
            <a href="?sort={% if current_sort == 'total_cost' %}-total_cost{% else %}total_cost{% endif %}" hx-get="{% url 'reports:overview' %}?sort={% if current_sort == 'total_cost' %}-total_cost{% else %}total_cost{% endif %}" hx-target="#report-table-body" class="hover:text-blue-500">Operational Cost</a>
          </th>
        </tr>
      </thead>
      <tbody id="report-table-body" class="divide-y divide-gray-200 bg-white dark:divide-gray-700 dark:bg-gray-800">
        {% include "reports/partials/vehicle_table.html" %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
